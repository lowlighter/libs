<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="layout-simple">
    <main>
      <form>
        <label>
          QR Code content:
          <small>Enter some text to generate a new QR Code.</small>
          <input required name="content" value="bonjour" type="text">
        </label>
        <label>
          Format:
          <small>Output image format (SVG string or PNG bytes).</small>
          <select name="format">
            <option value="svg" selected>SVG</option>
            <option value="png">PNG</option>
          </select>
        </label>
      </form>
      <p style="text-align: center">
        <img style="max-width: 512px" src="/api/qrcode/get?content=bonjour&format=svg">
      </p>
      <script src="/script.js"></script>
      <script data-src="/qrcode/script.js"></script>
    </main>
  </body>
</html>
