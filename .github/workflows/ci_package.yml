name: Package
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Event ref
        required: true
        default: refs/heads/main
        type: choice
        options:
          - refs/heads/main
      event:
        description: Event name
        required: true
        default: push
        type: choice
        options:
          - push
      package:
        description: Package
        required: true
        type: string
      publish:
        description: Publish
        default: false
        type: boolean
  workflow_call:
    inputs:
      ref:
        description: Event ref
        required: true
        type: string
      event:
        description: Event name
        required: true
        type: string
      package:
        description: Package
        required: true
        type: string
      publish:
        description: Publish
        default: false
        type: boolean
    secrets:
      NPM_TOKEN:
        description: NPM token
        required: true
      GH_TOKEN:
        description: GitHub token
        required: true
defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      edited: ${{ steps.files.outputs.edited }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
      - name: List changed files
        id: files
        env:
          PACKAGE: ${{ inputs.package }}
          BASE: ${{ github.base_ref && format('origin/{0}', github.base_ref) || github.event.before }}
        run: |
          echo "edited=$(deno eval --quiet '
            import { changed } from "./@libs/git/utils.ts"
            console.log(changed([`${Deno.env.get("PACKAGE")}/**`, ".github/workflows/ci_package.yml"], { base: Deno.env.get("BASE") }).length > 0)
          ')" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    if: (inputs.ref == 'refs/heads/main' && inputs.event == 'push') || (needs.setup.outputs.edited == 'true')
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno fmt --check
      - run: deno lint

  test:
    name: Test
    if: (inputs.ref == 'refs/heads/main' && inputs.event == 'push') || (needs.setup.outputs.edited == 'true')
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno test --allow-all

  publish:
    name: Publish
    if: inputs.ref == 'refs/heads/main' && inputs.event == 'push' && inputs.publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
      - name: Run deno bump-version
        id: bump
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          NAME="$(deno eval --quiet 'import { parse } from "jsr:@std/jsonc"; console.log(parse(Deno.readTextFileSync(`${Deno.env.get("PACKAGE")}/deno.jsonc`)).name.split("/").at(-1))')"
          export NAME
          LAST="$(deno eval --quiet 'import { tags } from "./@libs/git/tag.ts"; console.log(tags({ glob: `${Deno.env.get("NAME")}-*` }).at(-1) ?? "")')"
          export LAST
          if [ -z "$LAST" ]; then
            echo "Package has never been released, skipping"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          INCREMENT="$(deno eval --quiet '
            import { log } from "./@libs/git/log.ts"
            const commits = log(Deno.env.get("LAST"), { filter: { conventional: true, scopes: [Deno.env.get("NAME")] } })
            if (commits.some(({ breaking }) => breaking)) console.log("major")
            else if (commits.some(({ type }) => type === "feat")) console.log("minor")
            else if (commits.length) console.log("patch")
          ')"
          if [ -z "$INCREMENT" ]; then
            echo "No conventional commits scoped to $NAME since $LAST, skipping"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          deno bump-version --start "$LAST" "$INCREMENT"
          git checkout --quiet -- . ":(exclude)$PACKAGE/deno.jsonc"
          git clean --force --quiet -- Releases.md
          if git diff --quiet -- "$PACKAGE/deno.jsonc"; then
            echo "No release to be done, skipping"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="$(deno eval --quiet 'import { parse } from "jsr:@std/jsonc"; console.log(parse(Deno.readTextFileSync(`${Deno.env.get("PACKAGE")}/deno.jsonc`)).version)')"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NAME-$VERSION" >> "$GITHUB_OUTPUT"
      # Commit bump and tag release
      - name: Run git commit, push and tag
        if: steps.bump.outputs.tag
        env:
          PACKAGE: ${{ inputs.package }}
          NAME: ${{ steps.bump.outputs.name }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          deno eval --quiet '
            import { commit, pull, push, tag } from "./@libs/git/mod.ts"
            const [pkg, name, tagname] = [Deno.env.get("PACKAGE"), Deno.env.get("NAME"), Deno.env.get("TAG")]
            commit(`chore(${name}): bump version ${tagname}`, { paths: [`${pkg}/deno.jsonc`] })
            pull({ rebase: true })
            push()
            tag(tagname)
            push(tagname)
          '
      # Publish to jsr.io
      - name: Run deno publish
        if: steps.bump.outputs.tag
        working-directory: ${{ inputs.package }}
        run: deno publish
      # Publish to npm
      - name: Run deno pack and npm publish
        if: steps.bump.outputs.tag
        working-directory: ${{ inputs.package }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > "$HOME/.npmrc"
          deno run --allow-all "$(git rev-parse --show-toplevel)/@libs/toolbox/scripts/publish/npm.ts" --scope '@lowlighter'
      # Publish to deno.land/x
      - name: Check deno.land/x registration
        id: x
        if: steps.bump.outputs.tag
        working-directory: ${{ inputs.package }}
        run: |
          echo "registered=$(deno eval --quiet 'import { parse } from "jsr:@std/jsonc"; console.log(parse(Deno.readTextFileSync("deno.jsonc"))["deno.land/x"] ? "true" : "")')" >> "$GITHUB_OUTPUT"
      - name: Run deno.land/x publish
        if: steps.bump.outputs.tag && steps.x.outputs.registered
        working-directory: ${{ inputs.package }}
        run: deno run --allow-all "$(git rev-parse --show-toplevel)/@libs/toolbox/scripts/publish/x.ts" --repository '${{ github.repository }}' --token '${{ secrets.GH_TOKEN }}' --directory "$(git rev-parse --show-prefix)" --map deno.jsonc --reactive --remove
