name: Continuous Integration
on:
  push:
    branches: main
  pull_request:
    branches: main
    paths-ignore:
      - "**/*.md"
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: List packages
        id: packages
        run: |
          echo "packages=$(deno eval --quiet '
            import { parse } from "jsr:@std/jsonc"
            import { expandGlob } from "jsr:@std/fs"
            import { dirname, relative } from "jsr:@std/path"
            const { workspace = [] } = parse(Deno.readTextFileSync("deno.jsonc"))
            const packages = []
            for (const member of workspace) {
              for await (const { path } of expandGlob(`${member}/deno.json?(c)`, { includeDirs: false })) {
                packages.push(relative(Deno.cwd(), dirname(path)))
              }
            }
            console.log(JSON.stringify(packages))
          ')" >> "$GITHUB_OUTPUT"

  package:
    name: Package
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
    permissions:
      id-token: write
      contents: write
      packages: write
    uses: lowlighter/libs/.github/workflows/ci_package.yml@main
    with:
      ref: ${{ github.ref }}
      event: ${{ github.event_name }}
      package: ${{ matrix.package }}
      publish: ${{ github.event_name == 'push' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  coverage:
    name: Coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - setup
      - package
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    permissions:
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: denoland/setup-deno@v2
      - name: Run deno test --coverage
        run: |
          deno test --allow-all --coverage
          deno coverage --html
          mv coverage/html _site
      - uses: actions/upload-pages-artifact@v3
      - id: pages
        uses: actions/deploy-pages@v4

  publish:
    name: Publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
      - name: Run deno.land/x publish
        run: deno run --allow-all @libs/toolbox/scripts/publish/x.ts --repository '${{ github.repository }}' --token '${{ secrets.GH_TOKEN }}' --name libs --version "$(date '+%Y.%m.%d')" --map deno.jsonc --reactive --remove
